name: Build and Deploy

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: hello-node
  REGISTRY: docker.io/joaopedroimorais
  OPENSHIFT_PROJECT: joaopedroigeski-dev
  IS_USING_CONTAINER: 'false'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build da imagem
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} .

      - name: Push da imagem
        run: |
          docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}

      - name: Install oc
        uses: redhat-actions/oc-installer@v1
        with:
          oc_version: '4.6'

      - name: Login no OpenShift
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify=true

      - name: Selecionar projeto sandbox
        run: |
          oc project $OPENSHIFT_PROJECT

      - name: Atualizar deployment
        if: env.IS_USING_CONTAINER == 'true'
        run: |
          oc set image deployment/hello-world-node-js \
            container=$REGISTRY/$IMAGE_NAME:${{ github.sha }}

      - name: Atualizar deployment
        if: env.IS_USING_CONTAINER == 'false'
        run: |
          oc start-build hello-js
