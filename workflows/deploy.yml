name: Build and Deploy

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: hello-node
  REGISTRY: docker.io/joaopedroimorais

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build da imagem
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:latest .

      - name: Push da imagem
        run: |
          docker push $REGISTRY/$IMAGE_NAME:latest

      - name: Login no OpenShift
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify=true

      - name: Selecionar projeto
        run: |
          oc project ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Atualizar deployment (refresh)
        run: |
          oc set image deployment/hello-node hello-node=$REGISTRY/$IMAGE_NAME:latest
